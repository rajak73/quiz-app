<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Quiz</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <a href="login.html" class="back-link">← Back to Login</a>

            <div class="auth-logo">
                <span class="logo-icon">📧</span>
                <h1>Verify Your Email</h1>
                <p>We've sent a 6-digit code to</p>
            </div>

            <div class="email-display" id="emailDisplay">loading...</div>

            <form id="otpForm" onsubmit="handleVerify(event)">
                <div class="otp-container" id="otpContainer">
                    <input type="text" class="otp-input" maxlength="1" data-index="0" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" data-index="1" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" data-index="2" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" data-index="3" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" data-index="4" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" data-index="5" inputmode="numeric">
                </div>

                <button type="submit" class="btn-submit btn-success" id="submitBtn">
                    <span id="btnText">Verify Email</span>
                    <span class="spinner" id="spinner" style="display: none;"></span>
                </button>
            </form>

            <div class="resend-section">
                <p>Didn't receive the code?</p>
                <button type="button" class="resend-btn" id="resendBtn" onclick="resendOTP()" disabled>
                    Resend in <span id="timer">60</span>s
                </button>
            </div>

            <div class="auth-footer">
                <a href="signup.html">Use a different email</a>
            </div>
        </div>
    </div>

    <script>
        // API Base URL - Automatically detects local vs production
        const API_BASE_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000/api' 
            : 'https://quiz-app-0flj.onrender.com/api';

        let resendTimer = 60;
        let timerInterval = null;
        let userEmail = '';

        function initPage() {
            userEmail = sessionStorage.getItem('pendingVerification');
            if (!userEmail) {
                showToast('No email found. Redirecting...', 'error');
                setTimeout(() => { window.location.href = 'signup.html'; }, 2000);
                return;
            }
            document.getElementById('emailDisplay').textContent = maskEmail(userEmail);
            setupOTPInputs();
            startResendTimer();
            document.querySelector('.otp-input').focus();
        }

        function maskEmail(email) {
            const [localPart, domain] = email.split('@');
            return `${localPart.substring(0, 3)}****@${domain}`;
        }

        function setupOTPInputs() {
            const inputs = document.querySelectorAll('.otp-input');
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');
                    if (e.target.value && index < inputs.length - 1) inputs[index + 1].focus();
                    e.target.classList.toggle('filled', e.target.value !== '');
                    checkAutoSubmit();
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        inputs[index - 1].focus();
                        inputs[index - 1].value = '';
                    }
                });

                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const data = e.clipboardData.getData('text').replace(/[^0-9]/g, '').substring(0, 6);
                    if (data.length === 6) {
                        inputs.forEach((inp, i) => {
                            inp.value = data[i];
                            inp.classList.add('filled');
                        });
                        handleVerify(new Event('submit'));
                    }
                });
            });
        }

        function checkAutoSubmit() {
            const otp = Array.from(document.querySelectorAll('.otp-input')).map(i => i.value).join('');
            if (otp.length === 6) handleVerify(new Event('submit'));
        }

        async function handleVerify(e) {
            if (e) e.preventDefault();
            const otp = Array.from(document.querySelectorAll('.otp-input')).map(i => i.value).join('');
            if (otp.length !== 6) return;

            setLoading(true);
            try {
                const response = await fetch(`${API_BASE_URL}/auth/verify-email`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include', // ✅ CRITICAL: Required for backend JWT cookies
                    body: JSON.stringify({ email: userEmail, otp })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Verification failed');

                showToast('Email verified successfully!', 'success');
                sessionStorage.removeItem('pendingVerification');

                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                }

                setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            } catch (error) {
                showOTPError();
                showToast(error.message, 'error');
            } finally {
                setLoading(false);
            }
        }

        async function resendOTP() {
            if (resendTimer > 0) return;
            const resendBtn = document.getElementById('resendBtn');
            resendBtn.disabled = true;
            try {
                const response = await fetch(`${API_BASE_URL}/auth/resend-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });
                if (!response.ok) throw new Error('Failed to resend code');
                showToast('New code sent!', 'success');
                startResendTimer();
            } catch (error) {
                showToast(error.message, 'error');
                resendBtn.disabled = false;
            }
        }

        function startResendTimer() {
            resendTimer = 60;
            const resendBtn = document.getElementById('resendBtn');
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                resendTimer--;
                document.getElementById('timer').textContent = resendTimer;
                if (resendTimer <= 0) {
                    clearInterval(timerInterval);
                    resendBtn.disabled = false;
                    resendBtn.innerHTML = 'Resend Code';
                }
            }, 1000);
        }

        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            btn.disabled = isLoading;
            btnText.textContent = isLoading ? 'Verifying...' : 'Verify Email';
            spinner.style.display = isLoading ? 'inline-block' : 'none';
        }

        function showOTPError() {
            document.querySelectorAll('.otp-input').forEach(i => {
                i.classList.add('error');
                i.value = '';
            });
            setTimeout(() => document.querySelectorAll('.otp-input').forEach(i => i.classList.remove('error')), 1000);
            document.querySelector('.otp-input').focus();
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
