<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Quiz</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Back Link -->
            <a href="login.html" class="back-link">
                ← Back to Login
            </a>

            <!-- Step 1: Email Input -->
            <div id="step1">
                <div class="auth-logo">
                    <span class="logo-icon">🔑</span>
                    <h1>Forgot Password?</h1>
                    <p>No worries! Enter your email and we'll send you a reset code.</p>
                </div>

                <form id="emailForm" onsubmit="handleEmailSubmit(event)">
                    <div class="form-group" id="emailGroup">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <input 
                                type="email" 
                                class="form-input" 
                                id="email" 
                                placeholder="Enter your registered email"
                                required
                            >
                            <span class="input-icon">📧</span>
                        </div>
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <button type="submit" class="btn-submit" id="emailBtn">
                        <span id="emailBtnText">Send Reset Code</span>
                        <span class="spinner" id="emailSpinner" style="display: none;"></span>
                    </button>
                </form>
            </div>

            <!-- Step 2: OTP + New Password -->
            <div id="step2" style="display: none;">
                <div class="auth-logo">
                    <span class="logo-icon">🔐</span>
                    <h1>Reset Password</h1>
                    <p>Enter the code sent to your email</p>
                </div>

                <div class="email-display" id="emailDisplay"></div>

                <form id="resetForm" onsubmit="handleResetSubmit(event)">
                    <!-- OTP -->
                    <div class="otp-container" id="otpContainer">
                        <input type="text" class="otp-input" maxlength="1" data-index="0" inputmode="numeric">
                        <input type="text" class="otp-input" maxlength="1" data-index="1" inputmode="numeric">
                        <input type="text" class="otp-input" maxlength="1" data-index="2" inputmode="numeric">
                        <input type="text" class="otp-input" maxlength="1" data-index="3" inputmode="numeric">
                        <input type="text" class="otp-input" maxlength="1" data-index="4" inputmode="numeric">
                        <input type="text" class="otp-input" maxlength="1" data-index="5" inputmode="numeric">
                    </div>

                    <!-- New Password -->
                    <div class="form-group" id="newPasswordGroup">
                        <label>New Password</label>
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                class="form-input" 
                                id="newPassword" 
                                placeholder="Enter new password"
                                required
                                oninput="checkPasswordStrength()"
                            >
                            <span class="input-icon">🔒</span>
                            <button type="button" class="password-toggle" onclick="togglePassword('newPassword')">
                                👁️
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar">
                                <div class="strength-fill" id="strengthFill"></div>
                            </div>
                            <span class="strength-text" id="strengthText"></span>
                        </div>
                        <span class="error-message" id="newPasswordError"></span>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group" id="confirmPasswordGroup">
                        <label>Confirm New Password</label>
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                class="form-input" 
                                id="confirmPassword" 
                                placeholder="Confirm new password"
                                required
                            >
                            <span class="input-icon">🔒</span>
                            <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                                👁️
                            </button>
                        </div>
                        <span class="error-message" id="confirmPasswordError"></span>
                    </div>

                    <button type="submit" class="btn-submit btn-success" id="resetBtn">
                        <span id="resetBtnText">Reset Password</span>
                        <span class="spinner" id="resetSpinner" style="display: none;"></span>
                    </button>
                </form>

                <!-- Resend -->
                <div class="resend-section">
                    <button type="button" class="resend-btn" id="resendBtn" onclick="resendCode()" disabled>
                        Resend in <span id="timer">60</span>s
                    </button>
                </div>
            </div>

            <!-- Step 3: Success -->
            <div id="step3" style="display: none;">
                <div class="success-box">
                    <div class="icon">✅</div>
                    <h2 style="color: #2ed573;">Password Reset Successful!</h2>
                    <p style="margin-top: 10px; color: var(--text-secondary);">
                        Your password has been changed. You can now login with your new password.
                    </p>
                </div>

                <a href="login.html" class="btn-submit btn-success" style="text-decoration: none; display: block; text-align: center;">
                    Go to Login
                </a>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // FORGOT PASSWORD - JAVASCRIPT FUNCTIONS
        // ============================================

        // API Base URL - Automatically detects local vs production
        const API_BASE_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000/api' 
            : 'https://quiz-app-backend.onrender.com/api'; // Update this with your Render URL

        let userEmail = '';
        let resendTimer = 60;
        let timerInterval = null;

        // 1. Toggle Password
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const toggle = input.parentElement.querySelector('.password-toggle');
            
            if (input.type === 'password') {
                input.type = 'text';
                toggle.textContent = '🙈';
            } else {
                input.type = 'password';
                toggle.textContent = '👁️';
            }
        }

        // 2. Check Password Strength
        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');
            
            let strength = 0;

            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            fill.classList.remove('weak', 'medium', 'strong');

            if (strength <= 2) {
                fill.classList.add('weak');
                text.textContent = 'Weak password';
            } else if (strength <= 4) {
                fill.classList.add('medium');
                text.textContent = 'Medium strength';
            } else {
                fill.classList.add('strong');
                text.textContent = 'Strong password ✓';
            }
        }

        // 3. Show Toast
        function showToast(message, type = 'info') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span>
                <span>${message}</span>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // 4. Validate Email
        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // 5. Mask Email
        function maskEmail(email) {
            const [localPart, domain] = email.split('@');
            const visible = localPart.substring(0, 3);
            const masked = '*'.repeat(Math.max(0, localPart.length - 3));
            return `${visible}${masked}@${domain}`;
        }

        // 6. Show/Clear Error
        function showError(groupId, message) {
            const group = document.getElementById(groupId);
            group.classList.add('error');
            group.querySelector('.error-message').textContent = message;
        }

        function clearError(groupId) {
            const group = document.getElementById(groupId);
            group.classList.remove('error');
        }

        // 7. Setup OTP Inputs
        function setupOTPInputs() {
            const inputs = document.querySelectorAll('.otp-input');

            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');
                    if (e.target.value && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                    e.target.classList.toggle('filled', e.target.value !== '');
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        inputs[index - 1].focus();
                    }
                });

                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const pasted = e.clipboardData.getData('text').replace(/[^0-9]/g, '');
                    if (pasted.length === 6) {
                        inputs.forEach((inp, i) => {
                            inp.value = pasted[i] || '';
                            inp.classList.toggle('filled', inp.value !== '');
                        });
                    }
                });
            });
        }

        // 8. Get OTP
        function getOTP() {
            return Array.from(document.querySelectorAll('.otp-input')).map(i => i.value).join('');
        }

        // 9. Start Resend Timer
        function startResendTimer() {
            resendTimer = 60;
            const resendBtn = document.getElementById('resendBtn');
            resendBtn.disabled = true;
            resendBtn.innerHTML = `Resend in <span id="timer">60</span>s`;

            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                resendTimer--;
                document.getElementById('timer').textContent = resendTimer;

                if (resendTimer <= 0) {
                    clearInterval(timerInterval);
                    resendBtn.disabled = false;
                    resendBtn.innerHTML = 'Resend Code';
                }
            }, 1000);
        }

        // 10. Handle Email Submit (Step 1)
        async function handleEmailSubmit(e) {
            e.preventDefault();
            clearError('emailGroup');

            const email = document.getElementById('email').value.trim();

            if (!email || !validateEmail(email)) {
                showError('emailGroup', 'Please enter a valid email');
                return;
            }

            const btn = document.getElementById('emailBtn');
            const btnText = document.getElementById('emailBtnText');
            const spinner = document.getElementById('emailSpinner');

            btn.disabled = true;
            btnText.textContent = 'Sending...';
            spinner.style.display = 'inline-block';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Failed to send code');
                }

                userEmail = email;
                document.getElementById('emailDisplay').textContent = maskEmail(email);

                // Switch to step 2
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';

                setupOTPInputs();
                startResendTimer();
                document.querySelector('.otp-input').focus();

                showToast('Reset code sent to your email!', 'success');

            } catch (error) {
                if (error.message.includes('not found') || error.message.includes('not registered')) {
                    showError('emailGroup', 'No account found with this email');
                } else {
                    showToast(error.message || 'Something went wrong', 'error');
                }
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Send Reset Code';
                spinner.style.display = 'none';
            }
        }

        // 11. Handle Reset Submit (Step 2)
        async function handleResetSubmit(e) {
            e.preventDefault();
            clearError('newPasswordGroup');
            clearError('confirmPasswordGroup');

            const otp = getOTP();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validations
            if (otp.length !== 6) {
                showToast('Please enter the 6-digit code', 'error');
                return;
            }

            if (!newPassword || newPassword.length < 6) {
                showError('newPasswordGroup', 'Password must be at least 6 characters');
                return;
            }

            if (newPassword !== confirmPassword) {
                showError('confirmPasswordGroup', 'Passwords do not match');
                return;
            }

            const btn = document.getElementById('resetBtn');
            const btnText = document.getElementById('resetBtnText');
            const spinner = document.getElementById('resetSpinner');

            btn.disabled = true;
            btnText.textContent = 'Resetting...';
            spinner.style.display = 'inline-block';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: userEmail, 
                        otp: otp, 
                        newPassword: newPassword 
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Reset failed');
                }

                // Show success step
                document.getElementById('step2').style.display = 'none';
                document.getElementById('step3').style.display = 'block';

            } catch (error) {
                if (error.message.includes('Invalid') || error.message.includes('incorrect')) {
                    showToast('Invalid or expired code', 'error');
                } else {
                    showToast(error.message || 'Something went wrong', 'error');
                }
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Reset Password';
                spinner.style.display = 'none';
            }
        }

        // 12. Resend Code
        async function resendCode() {
            if (resendTimer > 0) return;

            try {
                const response = await fetch(`${API_BASE_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });

                if (!response.ok) throw new Error('Failed to resend');

                showToast('New code sent!', 'success');
                startResendTimer();

            } catch (error) {
                showToast('Failed to resend code', 'error');
            }
        }
    </script>
</body>
</html>
